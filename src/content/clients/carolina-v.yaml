name: Carolina V.
quote_en: >-
  I came in for my graduation look with no idea what I wanted, and left feeling
  like the best version of myself. The team listened, advised, and delivered
  something beyond what I could have imagined. Absolutely magical.
quote_pt: >-
  Cheguei para minha produção de formatura sem saber o que queria e saí me
  sentindo a melhor versão de mim mesma. A equipe ouviu, aconselhou e entregou
  algo além do que eu poderia ter imaginado. Simplesmente mágico.
quote_sp: >-
  Llegué para mi producción de graduación sin saber qué quería, y me fui
  sintiéndome la mejor versión de mí misma. El equipo escuchó, aconsejó y logró
  algo más allá de lo que pude haber imaginado. Absolutamente mágico.
occasion_en: Graduation
