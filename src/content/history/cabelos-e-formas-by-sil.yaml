year: '2011'
title_en: Cabelos e Formas by Sil — Criciúma
title_pt: Cabelos e Formas by Sil — Criciúma
title_sp: Cabelos e Formas by Sil — Criciúma
desc_en: >-
  A third location opened in Criciúma, integrating both hair services and
  barbershop offerings with a team of 16 professionals — including
  hairdressers, barbers, manicurists, masseurs, receptionists, and salon
  managers.
desc_pt: >-
  Uma terceira unidade foi inaugurada em Criciúma, integrando serviços
  capilares e barbearia com uma equipe de 16 profissionais — incluindo
  cabeleireiros, barbeiros, manicures, massagistas, recepcionistas e
  gerentes de salão.
desc_sp: >-
  Se abrió una tercera ubicación en Criciúma, integrando servicios capilares
  y barbería con un equipo de 16 profesionales — incluyendo estilistas,
  barberos, manicuristas, masajistas, recepcionistas y gerentes de salón.
