year: '1999'
title_en: Cabelos e Formas — Içara
title_pt: Cabelos e Formas — Içara
title_sp: Cabelos e Formas — Içara
desc_en: >-
  Cabelos e Formas began operations in Içara, Brazil, with a team of 5
  employees offering comprehensive beauty salon services. This was the
  foundation of what would become a reference in hair transformation and
  bridal beauty.
desc_pt: >-
  Cabelos e Formas iniciou suas operações em Içara, Brasil, com uma equipe de
  5 funcionários oferecendo serviços completos de salão de beleza. Este foi o
  alicerce do que se tornaria referência em transformação capilar e beleza
  nupcial.
desc_sp: >-
  Cabelos e Formas comenzó sus operaciones en Içara, Brasil, con un equipo de
  5 empleados ofreciendo servicios completos de salón de belleza. Esta fue la
  base de lo que se convertiría en referencia en transformación capilar y
  belleza nupcial.
