year: '2021'
title_en: Cabelos e Formas Centro — Criciúma
title_pt: Cabelos e Formas Centro — Criciúma
title_sp: Cabelos e Formas Centro — Criciúma
desc_en: >-
  Another Criciúma location opened, operating with a team of 12 professionals
  across salon management, reception, hair styling, manicure, beauty, and
  massage services. That year, the four units together served 23,006 clients,
  including 4,299 new clients, with 54 professionals across all locations.
desc_pt: >-
  Mais uma unidade foi inaugurada em Criciúma, operando com uma equipe de 12
  profissionais em gestão de salão, recepção, cabelo, manicure, estética e
  massagem. Naquele ano, as quatro unidades juntas atenderam 23.006 clientes,
  incluindo 4.299 novos clientes, com 54 profissionais em todas as unidades.
desc_sp: >-
  Se abrió otra ubicación en Criciúma, operando con un equipo de 12
  profesionales en gestión de salón, recepción, estilismo, manicura, estética
  y masajes. Ese año, las cuatro unidades juntas atendieron a 23.006 clientes,
  incluyendo 4.299 nuevos clientes, con 54 profesionales en todas las
  ubicaciones.
