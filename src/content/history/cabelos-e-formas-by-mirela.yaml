year: '2009'
title_en: Cabelos e Formas by Mirela — Criciúma
title_pt: Cabelos e Formas by Mirela — Criciúma
title_sp: Cabelos e Formas by Mirela — Criciúma
desc_en: >-
  A second location opened in downtown Criciúma with 14 professionals. This
  unit specialized in bridal services and pioneered the "Day of the Bride"
  concept in the city, becoming a recognized reference for wedding
  preparations. Over the years, the company has served more than 2,000 brides.
desc_pt: >-
  Uma segunda unidade foi inaugurada no centro de Criciúma com 14
  profissionais. Esta unidade se especializou em serviços para noivas e
  foi pioneira no conceito do "Dia da Noiva" na cidade, tornando-se
  referência reconhecida em preparação para casamentos. Ao longo dos anos,
  a empresa atendeu mais de 2.000 noivas.
desc_sp: >-
  Se abrió una segunda ubicación en el centro de Criciúma con 14
  profesionales. Esta unidad se especializó en servicios nupciales y fue
  pionera en el concepto del "Día de la Novia" en la ciudad, convirtiéndose
  en referencia reconocida en preparación para bodas. A lo largo de los años,
  la empresa ha atendido a más de 2.000 novias.
